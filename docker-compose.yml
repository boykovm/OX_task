services:
  mongodb:
    image: mongo:8
    container_name: ox_task_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-ox_task}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ox_network

  be:
    build:
      context: .
      target: development
    container_name: ox_task_be
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      # Mount source for live reload; keep container node_modules intact
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret}@mongodb:27017/${MONGO_DB:-ox_task}?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ox_network

networks:
  ox_network:
    driver: bridge

volumes:
  mongo_data: